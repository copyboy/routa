name: 'Copilot Complete Handler'

on:
  issues:
    types: [labeled]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number
      dry_run:
        description: 'Dry run (no actual changes)'
        required: false
        default: false
        type: boolean

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  handle-complete:
    name: 'Handle Copilot Complete'
    runs-on: ubuntu-latest

    # Trigger when the "Complete" label is added, or on manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'Complete'

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Convert draft PR and request Augment review
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
          DRY_RUN="${{ steps.issue.outputs.dry_run }}"

          echo "## 🤖 Copilot Complete Handler" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Processing issue #${ISSUE_NUMBER}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ARGS="--issue $ISSUE_NUMBER"
          if [ "$DRY_RUN" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          npx tsx scripts/copilot-complete-handler.ts $ARGS 2>&1 | tee /tmp/handler-output.txt

          echo "### Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/handler-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
