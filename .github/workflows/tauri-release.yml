name: 'Tauri Release'

on:
  workflow_call:
    inputs:
      version:
        description: "Semver version to release, ex: 0.2.4"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to release, ex: 0.2.4"
        required: true
        type: string

jobs:
  build-tauri:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            arch: 'arm64'
            key: 'darwin-arm64'
            bundles: 'app,dmg'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            arch: 'x64'
            key: 'darwin-x64'
            bundles: 'app,dmg'
          - platform: 'ubuntu-22.04'
            target: ''
            arch: 'x64'
            key: 'linux-x64'
            bundles: 'deb'
          - platform: 'windows-latest'
            target: ''
            arch: 'x64'
            key: 'windows-x64'
            bundles: 'nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      # [FIX] checkout@v6 不存在，回退到 v4
      - uses: actions/checkout@v4
        with:
          submodules: true

      # [OPT] Windows Defender 提前禁用，避免扫描 Rust toolchain 安装过程，节省 1-2min
      - name: Disable Windows Defender (Windows)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Sync release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version || github.event.inputs.version }}
        run: node scripts/release/sync-release-version.mjs --version "${RELEASE_VERSION}"

      - name: Verify synced release files
        shell: bash
        run: |
          changed_files=()
          while IFS= read -r line; do
            changed_files+=("$line")
          done < <(git diff --name-only)

          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "Release version already aligned"
            exit 0
          fi

          allowed_files=(
            "Cargo.toml"
            "package.json"
            "apps/desktop/package.json"
            "apps/desktop/src-tauri/Cargo.toml"
            "apps/desktop/src-tauri/tauri.conf.json"
            "packages/entrix/package.json"
            "packages/routa-cli/package.json"
            "packages/harness-monitor/package.json"
            "crates/routa-cli/Cargo.toml"
            "crates/routa-core/Cargo.toml"
            "crates/routa-rpc/Cargo.toml"
            "crates/routa-scanner/Cargo.toml"
            "crates/routa-server/Cargo.toml"
            "crates/entrix/Cargo.toml"
            "crates/harness-monitor/Cargo.toml"
          )

          for file in "${changed_files[@]}"; do
            case " ${allowed_files[*]} " in
              *" ${file} "*) ;;
              *)
                echo "Unexpected file changed during release version sync: ${file}" >&2
                exit 1
                ;;
            esac
          done

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            libclang-dev \
            cmake \
            build-essential

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # [OPT] rust-cache 缓存 registry + deps，不缓存 target 产物（target 留给 tauri build 自己管）
      #       cache-on-failure=true：即使构建失败也保存缓存，下次跑依赖不用重下
      #       GHA cache 不稳定时此步会静默跳过，不影响构建本身
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'
          cache-on-failure: true

      - name: Install root dependencies
        run: npm ci

      - name: Verify desktop workspace toolchain
        run: npm exec --workspace apps/desktop -- tauri --version

      - name: Verify root frontend toolchain
        run: npm exec --no -- next --version

      - name: Create placeholder frontend directory (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p apps/desktop/src-tauri/frontend
          echo "Placeholder for Tauri build" > apps/desktop/src-tauri/frontend/.placeholder

      - name: Create placeholder frontend directory (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path apps/desktop/src-tauri/frontend
          echo "Placeholder for Tauri build" > apps/desktop/src-tauri/frontend/.placeholder

      - name: Prepare frontend for Tauri bundling
        run: node scripts/prepare-frontend.mjs

      - name: Install Entrix
        run: python -m pip install entrix

      - name: Check macOS signing availability
        if: runner.os == 'macOS'
        id: check-signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" || -z "$APPLE_CERTIFICATE_PASSWORD" || -z "$KEYCHAIN_PASSWORD" ]]; then
            echo "⚠️  WARNING: Missing macOS signing certificates" >&2
            echo "macOS app will be built without code signing/notarization" >&2
            echo "SKIP_MACOS_SIGNING=true" >> "$GITHUB_ENV"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "SKIP_MACOS_SIGNING=false" >> "$GITHUB_ENV"
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare macOS signing keychain
        if: runner.os == 'macOS' && steps.check-signing.outputs.available == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "Setting up macOS code signing..."
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          if [[ -n "$APPLE_API_KEY" && -n "$APPLE_API_ISSUER" && -n "$APPLE_API_KEY_CONTENT" ]]; then
            api_key_path="$RUNNER_TEMP/appstoreconnect-${{ matrix.key }}.p8"
            printf '%s' "$APPLE_API_KEY_CONTENT" > "$api_key_path"
            chmod 600 "$api_key_path"
            echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
            echo "Using App Store Connect API key for notarization"
          elif [[ -n "$APPLE_ID" && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            echo "Using Apple ID credentials for notarization"
          else
            echo "Missing notarization credentials. Configure either APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID or APPLE_API_KEY/APPLE_API_ISSUER/APPLE_API_KEY_CONTENT." >&2
            exit 1
          fi

          cert_id="$APPLE_SIGNING_IDENTITY"
          if [[ -z "$cert_id" ]]; then
            cert_id="$(security find-identity -v -p codesigning build.keychain | awk -F'\"' 'NR==1 { print $2 }')"
          fi

          if [[ -z "$cert_id" ]]; then
            echo "Unable to resolve a codesigning identity from build.keychain" >&2
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"
          security find-identity -v -p codesigning build.keychain

      # [FIX] 原来 cd 进了 src-tauri 再跑 npx tauri build，导致找不到 package.json
      #       tauri build 必须在含 package.json 的 apps/desktop 下执行
      # [FIX] 去掉多余的 cargo build --release，tauri build 内部会自动触发，原来等于编译了两遍
      - name: Build Tauri app
        env:
          CI: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_LOG: "info"
          APPLE_CERTIFICATE: ${{ env.SKIP_MACOS_SIGNING != 'true' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.SKIP_MACOS_SIGNING != 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ env.SKIP_MACOS_SIGNING != 'true' && env.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ env.SKIP_MACOS_SIGNING != 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ env.SKIP_MACOS_SIGNING != 'true' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ env.SKIP_MACOS_SIGNING != 'true' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_API_KEY: ${{ env.SKIP_MACOS_SIGNING != 'true' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_ISSUER: ${{ env.SKIP_MACOS_SIGNING != 'true' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY_PATH: ${{ env.SKIP_MACOS_SIGNING != 'true' && env.APPLE_API_KEY_PATH || '' }}
        shell: bash
        run: |
          cd apps/desktop
          npx tauri build --bundles ${{ matrix.bundles }} ${{ env.SKIP_MACOS_SIGNING == 'true' && '--no-sign' || '' }}
        # NOTE: CI=true activates [profile.ci] in Cargo.toml (opt-level=2, lto=false)

      - name: Verify macOS signing and notarization
        if: runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p dist/release
          artifacts_list="dist/release/macos-artifacts-${{ matrix.key }}.txt"
          verification_log="dist/release/macos-verification-${{ matrix.key }}.log"
          bash scripts/release/verify-macos-signing.sh \
            --search-root apps/desktop/src-tauri/target \
            --list-out "$artifacts_list" \
            --log "$verification_log"

      - name: Generate release manifest
        shell: bash
        run: |
          node scripts/release/generate-release-manifest.mjs \
            --tauri-bundle-dir apps/desktop/src-tauri/target \
            --static-dir apps/desktop/src-tauri/frontend \
            --channel latest \
            --out dist/release/manifest-${{ matrix.key }}.json

      - name: Fetch baseline manifest
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/release/fetch-release-baseline.py \
            --repo phodal/routa \
            --workflow tauri-release.yml \
            --artifact-name routa-release-manifest-tauri-${{ matrix.key }} \
            --exclude-run-id "${{ github.run_id }}" \
            --out dist/release/baseline-manifest-${{ matrix.key }}.json

      - name: Guard release surface
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          if [[ -f dist/release/baseline-manifest-${{ matrix.key }}.json ]]; then
            entrix release-trigger \
              --manifest dist/release/manifest-${{ matrix.key }}.json \
              --baseline-manifest dist/release/baseline-manifest-${{ matrix.key }}.json \
              --fail-on-trigger
          else
            entrix release-trigger \
              --manifest dist/release/manifest-${{ matrix.key }}.json \
              --fail-on-trigger
          fi

      - name: Upload bundled assets
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-assets-${{ matrix.key }}
          # [FIX] 原路径正确，能找到文件的前提是 build 目录已修复
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*
          if-no-files-found: error

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: routa-release-manifest-tauri-${{ matrix.key }}
          path: dist/release/manifest-${{ matrix.key }}.json

      - name: Upload macOS verification logs
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos-verification-${{ matrix.key }}
          path: |
            dist/release/macos-artifacts-${{ matrix.key }}.txt
            dist/release/macos-verification-${{ matrix.key }}.log

  # [OPT] verify-tauri 已删除
  #       原因：build-tauri 每个 matrix job 里已有 Guard release surface 步骤，
  #       两者都执行 entrix release-trigger --fail-on-trigger，verify-tauri 是重复检查。
  #       删除后节省一个串行 job 的等待 + 启动时间（约 1-2min），
  #       同时 publish-tauri 可以更早开始。

  publish-tauri:
    name: Publish desktop release
    permissions:
      contents: write
    # [OPT] 去掉对 verify-tauri 的依赖，build-tauri 完成即可发布
    needs:
      - build-tauri
    runs-on: ubuntu-latest
    steps:
      # [FIX] checkout@v6 不存在，回退到 v4
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate changelog
        run: node scripts/release/generate-changelog.mjs --version "${{ inputs.version || github.event.inputs.version }}" --out dist/release-notes.md

      - name: Download bundled assets
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-release-assets-*
          path: dist/tauri-release
          merge-multiple: true

      - name: Publish draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version || github.event.inputs.version }}
          name: Routa Desktop v${{ inputs.version || github.event.inputs.version }}
          body_path: dist/release-notes.md
          draft: true
          prerelease: false
          files: |
            dist/tauri-release/**/*.dmg
            dist/tauri-release/**/*.app
            dist/tauri-release/**/*.deb
            dist/tauri-release/**/*.AppImage
            dist/tauri-release/**/*.msi
            dist/tauri-release/**/*.exe