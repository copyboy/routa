id: kanban-automation
goal: >
  在 workspace Kanban 视图创建卡片，并基于 Kanban 页内可见证据验证自动化 session 是否被触发；如果新卡创建后在 Backlog 内就已出现自动化反馈，也视为有效闭环。
entry_url: "http://localhost:3000/workspace/default/kanban"
preconditions:
  - "Kanban 页面可访问"
  - "有可编辑的默认看板与列"
execution_notes:
  - "进入 Kanban 后先确认默认看板已加载；如果页面仍显示 `No board available yet.`，可直接判为失败，不要跳去别的页面找原因。"
  - "优先使用 Kanban 页顶部输入框创建 1 张带唯一标题的新卡：在主输入框填入唯一标题后直接点击 `Send`，并确认它先出现在 Backlog；不要同时操作多张卡片。"
  - "只有在顶部输入框路径不可用、`Send` 无法触发，或页面明确要求手动创建时，才退回 `Manual issue` 弹窗路径。"
  - "如果新卡刚出现在 Backlog 就已经带有 `Live Session`、session 详情面板、provider/role/specialist 状态、live tail、`Stop`/`Rerun`/`Run` 按钮或类似自动化痕迹，就把这视为 Kanban 页内已经完成自动化触发；此时不再强求继续手动移动到别的列。"
  - "如果退回到 `Manual issue` 创建弹窗，就直接在当前弹窗里填入唯一标题并点击 `Create`；不要为了确认表单结构去查看仓库代码、组件实现或其他文档。"
  - "如果填完标题后 `Create` 按钮已经可点，就立即点击；不要继续补 description、test cases 或 labels。只有在按钮仍禁用时，才允许再补 1 行最短 description 做一次恢复性尝试。"
  - "如果补完这 1 行最短 description 后 `Create` 变为可点，就立刻点击；不要再截图回读、不要再二次分析按钮状态。"
  - "如果 `Manual issue` 路径在这一次恢复尝试后仍无法成功创建，就关闭弹窗并回到顶部输入框路径做且只做一次最终尝试；不要继续在弹窗里打转。"
  - "只把这 1 张新卡移动到一个带自动化的目标列，优先观察 Todo 或 Dev 这类当前看板内可见列，不做多列往返。"
  - "判断卡片如何移动时，只依据 Kanban 页面当前可见的按钮、下拉、详情面板或拖拽手柄；不要执行任何代码检索、实现排查或页面外调查。"
  - "移动完成后只在 Kanban 页面内观察同一张卡的详情面板、badge、toast、session 标识、live tail 或状态文案。"
  - "如果卡片详情已经出现 `Live Session`、`Stop`、`Rerun`、session/provider/role/specialist 信息或明显的 live tail 文本，就不要继续切换编辑态、搜索更多字段或反复开合面板；立即截图并结束。"
observation_targets:
  - "新卡创建后是否在 Backlog 内就直接出现自动化反馈"
  - "Backlog 到自动化列的移动是否顺畅"
  - "卡片详情中的 Session、provider、role、specialist、live tail 或 rerun/run 按钮状态"
  - "Kanban 页内的 toast、状态标签、队列提示和错误恢复入口；不把实现代码或后端状态当作额外观察目标"
stop_conditions:
  - "如果新卡仍在 Backlog，但同一张卡已经出现 `Live Session`、session 详情、provider/role/specialist、live tail、`Stop`/`Rerun`/`Run` 按钮或等价状态变化中的任意一项，就立即截图并结束；把它当作 Kanban 页内已观察到自动化触发。"
  - "如果新卡已进入目标列，并且同一张卡出现 session 标识、状态 badge、toast、live tail 或按钮状态变化中的任意一项，就立即截图并结束。"
  - "如果移动后等待 10 秒仍没有任何可见状态变化，就基于当前证据打分并结束，不要跳去 Settings、Overview 或 Sessions 页面继续查。"
  - "如果卡片创建弹窗或卡片详情里已经没有更明确的页面内入口，而你仍无法在 30 秒内完成下一步操作，就基于当前 Kanban 页面证据判定失败并结束；不要回头查看代码来找答案。"
  - "如果在创建弹窗里 `Create` 按钮已经可点，却连续一次操作后仍未成功创建卡片，就立即截图并结束；不要继续在弹窗里反复试填多个可选字段。"
  - "如果顶部输入框和 `Manual issue` 兜底各尝试 1 次后仍无法创建新卡，就基于当前证据判定失败并结束。"
success_signals:
  - "创建新卡成功并显示在 backlog"
  - "新卡在 Backlog 内即出现 session 详情、Live Session、provider/role/specialist、live tail 或等价自动化反馈"
  - "卡片成功移动到自动化列"
  - "自动化触发后在 session 区域有新会话记录或状态反馈"
failure_signals:
  - "卡片创建失败或不可见"
  - "拖拽/移动卡片后无状态更新"
  - "无法发现任何 session 触发痕迹"
score_rubric: |
  重点关注：
  1. 任务流是否能从输入到自动化触发完整闭环
  2. 错误状态是否可见且有恢复入口
  3. 页面反馈（toast、状态标签）是否及时且清晰
  4. 长等待是否有 loading 提示
