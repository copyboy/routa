rules:
  - id: security-review.command-exec
    message: Changed code invokes shell execution; verify untrusted input cannot reach command construction.
    severity: ERROR
    languages:
      - generic
    patterns:
      - pattern-either:
          - pattern: "exec("
          - pattern: "execSync("
          - pattern: "child_process.exec"
          - pattern: "spawn("
          - pattern: "spawnSync("

  - id: security-review.dangerous-html
    message: Changed code renders raw HTML; verify content is sanitized and not attacker-controlled.
    severity: WARNING
    languages:
      - generic
    patterns:
      - pattern-either:
          - pattern: "dangerouslySetInnerHTML"
          - pattern: "marked.parse("

  - id: security-review.outbound-fetch
    message: Changed code performs an outbound fetch; verify URL control, SSRF exposure, and localhost/private-network reachability.
    severity: WARNING
    languages:
      - generic
    patterns:
      - pattern: "fetch("

  - id: security-review.base-url-override
    message: Changed code touches provider base URL override paths; verify override sources are trusted and restricted.
    severity: WARNING
    languages:
      - generic
    patterns:
      - pattern-either:
          - pattern: "baseUrl:"
          - pattern: "ANTHROPIC_BASE_URL"

  - id: security-review.permission-bypass
    message: Changed code enables a bypass-style flag; verify the flag is not attacker-controlled and is guarded by policy.
    severity: ERROR
    languages:
      - generic
    patterns:
      - pattern-either:
          - pattern: "bypassPermissions: true"
          - pattern: "skipPermissionChecks: true"
          - pattern: "allowDangerous: true"
          - pattern: "bypass_permissions: true"

  - id: security-review.docker-network-exposure
    message: Changed configuration exposes broad container/network access; verify it is not enabled by default.
    severity: WARNING
    languages:
      - generic
    patterns:
      - pattern-either:
          - pattern: "-p 0.0.0.0:"
          - pattern: "--network host"
          - pattern: "--privileged"
